name: Deploy static site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build portable static site
        run: python3 v1/scripts/package_portable_project.py

      - name: Preserve underscore paths
        run: touch dist/shaanxi-capital-market-daily/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/shaanxi-capital-market-daily

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
